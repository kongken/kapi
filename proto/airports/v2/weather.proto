syntax = "proto3";

package airports.v2;

import "google/protobuf/struct.proto";

option go_package = "github.com/kongken/kapi/pkg/proto/airports/v2;airportsv2";

message GetWeatherRequest {
  string airport = 1;
}

message GetWeatherResponse {
  string source = 1;
  string airport = 2;
  string resource = 3;
  WeatherQuery query = 4;
  int32 total = 5;
  repeated Weather items = 6;
  google.protobuf.Struct raw = 7;
}

message WeatherQuery {}

message Weather {
  string date = 1;
  string high = 2;
  string low = 3;
  string type = 4;
  string icon_url = 5;
  google.protobuf.Struct raw = 6;
}
